name: Build FeedLabelCheck Data

on:
  workflow_dispatch:
  schedule:
    # GitHub schedule times are UTC. This runs every Monday at 03:17 UTC.
    - cron: "17 3 * * 1"

permissions:
  contents: read
  actions: write   # required by upload-artifact

jobs:
  build-data:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pipeline dependencies
        run: python -m pip install -r requirements-pipeline.txt

      - name: Download PDFs and rebuild JSON
        run: python Data/bvl_update_pipeline.py

      - name: Build SQLite database
        run: python scripts/build_sqlite_db.py --json Data/zusatzstoffe.json --out dist/feedlabelcheck.sqlite

      - name: Build labeling rules database
        run: python scripts/build_labeling_db.py --out dist/labeling.sqlite

      - name: Build data manifest
        run: python scripts/build_data_manifest.py --json Data/zusatzstoffe.json --sqlite dist/feedlabelcheck.sqlite --labeling-sqlite dist/labeling.sqlite --out dist/manifest.json

      - name: Upload data artifacts
        uses: actions/upload-artifact@v4
        with:
          name: feedlabelcheck-data
          path: |
            Data/zusatzstoffe.json
            dist/feedlabelcheck.sqlite
            dist/labeling.sqlite
            dist/manifest.json
          retention-days: 30

      - name: Check data repository token
        id: check-token
        env:
          DATA_REPO_TOKEN: ${{ secrets.FEEDLABELCHECK_DATA_REPO_TOKEN }}
        run: |
          if [ -z "$DATA_REPO_TOKEN" ]; then
            echo "::warning::Secret FEEDLABELCHECK_DATA_REPO_TOKEN not set — skipping publish to data repository."
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout public data repository
        if: steps.check-token.outputs.has_token == 'true'
        uses: actions/checkout@v4
        with:
          repository: Lightblue87/FeedLabelCheck-Data
          token: ${{ secrets.FEEDLABELCHECK_DATA_REPO_TOKEN }}
          path: public-data

      - name: Publish SQLite databases
        if: steps.check-token.outputs.has_token == 'true'
        run: |
          cp dist/feedlabelcheck.sqlite public-data/feedlabelcheck.sqlite
          cp dist/labeling.sqlite public-data/labeling.sqlite
          cp Data/zusatzstoffe.json public-data/zusatzstoffe.json
          cp dist/manifest.json public-data/manifest.json
          cp dist/manifest.json public-data/manifest-v2.json
          cd public-data
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add feedlabelcheck.sqlite labeling.sqlite zusatzstoffe.json manifest.json manifest-v2.json
          if git diff --cached --quiet; then
            echo "No data changes to publish."
          else
            git commit -m "Update generated FeedLabelCheck data (incl. labeling rules)"
            git push
          fi
